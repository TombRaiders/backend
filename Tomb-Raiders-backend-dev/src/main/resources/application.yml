spring:
  application:
    name: backend
  profiles:
    default: test
  web:
    resources:
      add-mappings: false
  data:
    redis:
      url: redis://localhost:6379
    web:
      pageable:
        serialization-mode: via-dto
#  test:
#    database:
#      replace: none
  # 임시
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 21MB

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:

  # 임시
  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false

springdoc:
  # Swagger UI 접속 주소를 /api/swagger-ui.html 로 변경
  swagger-ui:
    path: /api/swagger-ui.html

  # OpenAPI 메타데이터(JSON) 주소를 /api/v3/api-docs 로 변경
  api-docs:
    path: /api/v3/api-docs

app:
  base-url: ${BASE_URL}

# 임시 키
jwt:
  secret: dG9tYi1yYWlkZXJzLWJhY2tlbmQtand0LXNlY3JldC1rZXktMjAyNg==

management:
# 메일 연결 문제로 인해 일단 임시로 mail 부분은 health 체크 안하도록 하겠음
  health:
    mail:
      enabled: false
  endpoint:
    health:
      show-details: always
  endpoints:
    jmx:
      exposure:
        include: health

storage:
  type: mock

email:
  provider: mock

payment:
  toss:
    base-url: https://api.tosspayments.com
    secret-key: ${TOSS_SECRET_KEY}
